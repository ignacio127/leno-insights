name: Actualizar Dashboard LENO

on:
  schedule:
    - cron: '0 8,13,19 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Correr ingestor
        env:
          GESDATTA_EMAIL: ${{ secrets.GESDATTA_EMAIL }}
          GESDATTA_PASSWORD: ${{ secrets.GESDATTA_PASSWORD }}
        run: |
          python ingestor.py --desde 2026-06-01 --hasta 2026-06-30 --periodo Junio
          python ingestor.py --desde 2026-07-01 --hasta $(date +%Y-%m-%d) --periodo Julio

      - name: Preparar carpeta para publicar
        run: |
          mkdir -p public
          cp index.html public/index.html
          printf "User-agent: *\nDisallow: /\n" > public/robots.txt

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
