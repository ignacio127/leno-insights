name: Actualizar Dashboard LENO

on:
  schedule:
    - cron: '0 8,13,19 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "[TEMPORAL] Diagnostico campos de hora Gesdatta"
        env:
          GESDATTA_EMAIL: ${{ secrets.GESDATTA_EMAIL }}
          GESDATTA_PASSWORD: ${{ secrets.GESDATTA_PASSWORD }}
        run: |
          python check_campos_hora.py

      - name: Calcular periodos (mes actual y mes anterior)
        id: periodos
        run: |
          MESES=(Enero Febrero Marzo Abril Mayo Junio Julio Agosto Septiembre Octubre Noviembre Diciembre)
          HOY=$(date +%Y-%m-%d)
          ANIO_ACT=$(date +%Y); MES_ACT=$(date +%-m)
          PERIODO_ACT=${MESES[$((MES_ACT-1))]}
          DESDE_ACT="${ANIO_ACT}-$(printf '%02d' $MES_ACT)-01"
          HASTA_ACT="$HOY"
          PRIMER_DIA_ACT="${ANIO_ACT}-$(printf '%02d' $MES_ACT)-01"
          HASTA_ANT=$(date -d "$PRIMER_DIA_ACT -1 day" +%Y-%m-%d)
          DESDE_ANT=$(date -d "$HASTA_ANT" +%Y-%m-01)
          MES_ANT=$(date -d "$HASTA_ANT" +%-m)
          PERIODO_ANT=${MESES[$((MES_ANT-1))]}
          echo "periodo_act=$PERIODO_ACT" >> "$GITHUB_OUTPUT"
          echo "desde_act=$DESDE_ACT"     >> "$GITHUB_OUTPUT"
          echo "hasta_act=$HASTA_ACT"     >> "$GITHUB_OUTPUT"
          echo "periodo_ant=$PERIODO_ANT" >> "$GITHUB_OUTPUT"
          echo "desde_ant=$DESDE_ANT"     >> "$GITHUB_OUTPUT"
          echo "hasta_ant=$HASTA_ANT"     >> "$GITHUB_OUTPUT"
          echo "Mes anterior: $PERIODO_ANT ($DESDE_ANT -> $HASTA_ANT)"
          echo "Mes actual:   $PERIODO_ACT ($DESDE_ACT -> $HASTA_ACT)"
      - name: Correr ingestor

      - name: Calcular periodos (mes actual y mes anterior)
        id: periodos
        run: |
          MESES=(Enero Febrero Marzo Abril Mayo Junio Julio Agosto Septiembre Octubre Noviembre Diciembre)
          HOY=$(date +%Y-%m-%d)
          ANIO_ACT=$(date +%Y); MES_ACT=$(date +%-m)
          PERIODO_ACT=${MESES[$((MES_ACT-1))]}
          DESDE_ACT="${ANIO_ACT}-$(printf '%02d' $MES_ACT)-01"
          HASTA_ACT="$HOY"

          PRIMER_DIA_ACT="${ANIO_ACT}-$(printf '%02d' $MES_ACT)-01"
          HASTA_ANT=$(date -d "$PRIMER_DIA_ACT -1 day" +%Y-%m-%d)
          DESDE_ANT=$(date -d "$HASTA_ANT" +%Y-%m-01)
          MES_ANT=$(date -d "$HASTA_ANT" +%-m)
          PERIODO_ANT=${MESES[$((MES_ANT-1))]}

          echo "periodo_act=$PERIODO_ACT" >> "$GITHUB_OUTPUT"
          echo "desde_act=$DESDE_ACT"     >> "$GITHUB_OUTPUT"
          echo "hasta_act=$HASTA_ACT"     >> "$GITHUB_OUTPUT"
          echo "periodo_ant=$PERIODO_ANT" >> "$GITHUB_OUTPUT"
          echo "desde_ant=$DESDE_ANT"     >> "$GITHUB_OUTPUT"
          echo "hasta_ant=$HASTA_ANT"     >> "$GITHUB_OUTPUT"
          echo "Mes anterior: $PERIODO_ANT ($DESDE_ANT -> $HASTA_ANT)"
          echo "Mes actual:   $PERIODO_ACT ($DESDE_ACT -> $HASTA_ACT)"

      - name: Correr ingestor
        env:
          GESDATTA_EMAIL: ${{ secrets.GESDATTA_EMAIL }}
          GESDATTA_PASSWORD: ${{ secrets.GESDATTA_PASSWORD }}
        run: |
          python ingestor.py --desde ${{ steps.periodos.outputs.desde_ant }} --hasta ${{ steps.periodos.outputs.hasta_ant }} --periodo ${{ steps.periodos.outputs.periodo_ant }}
          python ingestor.py --desde ${{ steps.periodos.outputs.desde_act }} --hasta ${{ steps.periodos.outputs.hasta_act }} --periodo ${{ steps.periodos.outputs.periodo_act }}

      - name: Guardar master.json actualizado en el repo
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add master.json
          if git diff --staged --quiet; then
            echo "Sin cambios en master.json, nada para commitear."
            exit 0
          fi
          git commit -m "data: actualizar master.json $(date +%Y-%m-%d)"

          intentos=0; maximo=3
          while [ $intentos -lt $maximo ]; do
            intentos=$((intentos+1))
            if git push; then
              echo "Push OK (intento $intentos/$maximo)."
              exit 0
            fi
            echo "Push rechazado (intento $intentos/$maximo) — el remoto tiene commits que no teníamos al arrancar (por ej. alguien subió código mientras corría el workflow). Reintentando con rebase..."
            git fetch origin main
            if ! git rebase origin/main; then
              echo "ERROR: conflicto real de contenido al rebasear (no es solo una carrera de commits) — no reintento más. Revisar a mano."
              git rebase --abort
              exit 1
            fi
            sleep 5
          done
          echo "ERROR: no se pudo pushear master.json después de $maximo intentos."
          echo "El dashboard SÍ se va a publicar con los datos de esta corrida (siguen en el runner) — lo que queda pendiente es el commit de master.json al repo, que se sincroniza solo en la próxima corrida que logre pushear."
          exit 1

      - name: Preparar carpeta para publicar
        run: |
          mkdir -p public
          cp index.html public/index.html
          printf "User-agent: *\nDisallow: /\n" > public/robots.txt

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
